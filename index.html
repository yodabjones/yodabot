<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>yodabot</title>
  <meta name="description" content="yodabot landing page rendered from README.md" />
  <style>
    :root {
      --bg: #f7f5ef;
      --panel: #fffdf8;
      --ink: #1f1d1a;
      --muted: #6d675f;
      --line: #dfd8ca;
      --accent: #8b2f1f;
      --accent-soft: #f6e3dc;
      --code-bg: #f3efe6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 20% 0%, #fff6dd 0, rgba(255,246,221,0) 50%),
        radial-gradient(circle at 80% 10%, #ffe7de 0, rgba(255,231,222,0) 45%),
        var(--bg);
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", serif;
      line-height: 1.6;
    }

    .shell {
      width: min(980px, 100% - 2rem);
      margin: 1.2rem auto 2rem;
    }

    .hero {
      padding: 1rem 1.25rem;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(170deg, rgba(255,253,248,0.95), rgba(255,250,242,0.9));
      box-shadow: 0 10px 24px rgba(67, 43, 26, 0.08);
    }

    .kicker {
      font: 700 0.74rem/1.2 "Trebuchet MS", Verdana, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0.3rem 0 0;
      font-size: clamp(1.7rem, 4vw, 2.3rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .hint {
      margin-top: 0.4rem;
      color: var(--muted);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: 0.95rem;
    }

    .board {
      margin-top: 1rem;
      padding: 1.2rem;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(47, 29, 19, 0.06);
    }

    .status {
      margin: 0 0 0.9rem;
      color: var(--muted);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: 0.95rem;
    }

    .status.error {
      color: var(--accent);
      font-weight: 700;
    }

    #content {
      max-width: 78ch;
      margin: 0 auto;
    }

    #content h1,
    #content h2,
    #content h3,
    #content h4,
    #content h5,
    #content h6 {
      margin: 1.1em 0 0.45em;
      line-height: 1.25;
    }

    #content h1 { font-size: 1.95rem; }
    #content h2 {
      padding-bottom: 0.2em;
      border-bottom: 1px solid var(--line);
      font-size: 1.45rem;
    }
    #content h3 { font-size: 1.2rem; }

    #content p,
    #content ul,
    #content ol,
    #content pre,
    #content blockquote,
    #content table {
      margin: 0.65em 0;
    }

    #content a {
      color: var(--accent);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.13em;
    }

    #content a:hover {
      background: var(--accent-soft);
    }

    #content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
      background: var(--code-bg);
      padding: 0.12em 0.35em;
      border: 1px solid var(--line);
      border-radius: 0.35em;
    }

    #content pre {
      overflow: auto;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 0.65rem;
      padding: 0.8rem;
    }

    #content pre code {
      border: 0;
      background: transparent;
      padding: 0;
      white-space: pre;
    }

    #content blockquote {
      border-left: 4px solid #d8a995;
      padding: 0.3rem 0.9rem;
      color: #4b433b;
      background: #fff7f1;
      border-radius: 0 10px 10px 0;
    }

    #content hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 1rem 0;
    }

    #content img {
      max-width: 100%;
      border-radius: 0.6rem;
    }

    #content table {
      border-collapse: collapse;
      width: 100%;
    }

    #content th,
    #content td {
      border: 1px solid var(--line);
      padding: 0.45rem 0.6rem;
      text-align: left;
    }

    #content th {
      background: #fbf3e5;
    }

    .footer {
      margin-top: 1rem;
      color: var(--muted);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: 0.88rem;
      text-align: center;
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
</head>
<body>
  <main class="shell">
    <section class="hero" aria-label="Page Intro">
      <div class="kicker">Landing Page</div>
      <h1>yodabot</h1>
      <div class="hint">Rendering from README.md through index.html</div>
    </section>

    <section class="board" aria-live="polite">
      <p id="status" class="status">Loading README.md...</p>
      <article id="content"></article>
    </section>

    <p class="footer">Source: README.md</p>
  </main>

  <script>
    (async () => {
      const status = document.getElementById("status");
      const content = document.getElementById("content");

      try {
        const resp = await fetch("./README.md", { cache: "no-cache" });
        if (!resp.ok) {
          throw new Error("HTTP " + resp.status + " while loading README.md");
        }

        const markdown = await resp.text();

        if (window.marked && typeof window.marked.parse === "function") {
          window.marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: true,
            mangle: false
          });

          const rawHtml = window.marked.parse(markdown);
          const safeHtml = (window.DOMPurify && typeof window.DOMPurify.sanitize === "function")
            ? window.DOMPurify.sanitize(rawHtml)
            : rawHtml;
          content.innerHTML = safeHtml;
          status.textContent = "README.md loaded.";
          return;
        }

        content.textContent = markdown;
        status.textContent = "README.md loaded as plain text (markdown renderer unavailable).";
      } catch (err) {
        status.textContent = "Failed to load README.md.";
        status.classList.add("error");
        content.innerHTML = "<p>Could not render README content. Check that README.md exists in this repository root.</p>";
        console.error(err);
      }
    })();
  </script>
</body>
</html>
