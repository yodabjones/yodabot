<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>blearling.com - Latest AI Research Report</title>
  <meta name="description" content="Latest AI research report from yodabot" />
  <style>
    :root {
      --bg: #f2f7fb;
      --panel: #ffffff;
      --ink: #1c2733;
      --muted: #5d6b79;
      --line: #d8e0e8;
      --accent: #0a5f7e;
      --accent-soft: #e7f6fb;
      --code-bg: #f5f8fb;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 14% 0%, #dff5ff 0, rgba(223,245,255,0) 45%),
        radial-gradient(circle at 86% 0%, #ecffe6 0, rgba(236,255,230,0) 48%),
        var(--bg);
      color: var(--ink);
      font: 16px/1.6 "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .shell {
      width: min(1080px, 100% - 2rem);
      margin: 1rem auto 1.5rem;
    }

    .hero {
      padding: 1rem 1.2rem;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fdff 100%);
      box-shadow: 0 10px 24px rgba(14, 30, 37, 0.07);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3.8vw, 2rem);
      line-height: 1.2;
    }

    .hero p {
      margin: 0.35rem 0 0;
      color: var(--muted);
    }

    .links {
      margin-top: 0.7rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .links a {
      text-decoration: none;
      color: var(--accent);
      font-weight: 700;
      background: var(--accent-soft);
      border: 1px solid #c7e9f5;
      border-radius: 999px;
      padding: 0.35rem 0.72rem;
      font-size: 0.92rem;
    }

    .controls {
      margin-top: 0.8rem;
      display: grid;
      gap: 0.55rem;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .tag-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
    }

    .tag-btn {
      appearance: none;
      border: 1px solid #bfd8ea;
      background: #ffffff;
      color: #1f3f5c;
      border-radius: 999px;
      padding: 0.28rem 0.62rem;
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.2;
    }

    .tag-btn.active,
    .tag-btn[aria-pressed="true"] {
      background: #dff1ff;
      border-color: #85bddf;
      color: #0f466a;
    }

    .tag-meta {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .badge {
      display: inline-block;
      margin-left: 0.45rem;
      font-size: 0.74rem;
      color: #204b6d;
      background: #e9f4fc;
      border: 1px solid #c5dff2;
      border-radius: 999px;
      padding: 0.05rem 0.42rem;
      vertical-align: middle;
    }

    .board {
      margin-top: 0.9rem;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 10px 28px rgba(8, 19, 32, 0.06);
      overflow: hidden;
    }

    .status {
      margin: 0;
      padding: 0.8rem 1rem;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: #f8fbfd;
      font-size: 0.94rem;
    }

    .status.error {
      color: #b42318;
      font-weight: 700;
    }

    #fallback {
      display: none;
      padding: 1rem;
      max-width: 84ch;
      margin: 0 auto;
    }

    #fallback h1,
    #fallback h2,
    #fallback h3,
    #fallback h4 {
      line-height: 1.25;
      margin: 1.1em 0 0.45em;
    }

    #fallback h2 {
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.2em;
    }

    #fallback p,
    #fallback ul,
    #fallback ol,
    #fallback pre,
    #fallback blockquote,
    #fallback table {
      margin: 0.65em 0;
    }

    #fallback a {
      color: var(--accent);
      text-underline-offset: 0.12em;
    }

    #fallback code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 0.35em;
      padding: 0.12em 0.35em;
    }

    #fallback pre {
      overflow: auto;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 0.65rem;
      padding: 0.8rem;
    }

    #fallback pre code {
      border: 0;
      background: transparent;
      padding: 0;
    }

    #fallback table {
      border-collapse: collapse;
      width: 100%;
    }

    #fallback th,
    #fallback td {
      border: 1px solid var(--line);
      padding: 0.45rem 0.6rem;
      text-align: left;
    }

    #fallback th {
      background: #ebf6fb;
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Latest AI Research Report</h1>
      <p>Writer-rendered report output from researcher findings.</p>
      <nav class="links" aria-label="report links">
        <a href="/reports/ai/latest.html">Open latest report HTML</a>
        <a href="/reports/ai/latest.md">Open latest report Markdown</a>
        <a href="/reports/ai/">Open report archive</a>
      </nav>
      <div class="controls" aria-label="filter controls">
        <div class="tag-toolbar" id="tag-toolbar" aria-label="tag filters"></div>
        <div class="tag-meta" id="tag-meta">Filter entries by one or more tags.</div>
      </div>
    </section>

    <section class="board" aria-live="polite">
      <p id="status" class="status">Loading latest report...</p>
      <article id="fallback"></article>
    </section>
  </main>

  <script>
    (async () => {
      const statusEl = document.getElementById("status");
      const fallbackEl = document.getElementById("fallback");
      const latestMdPath = "/reports/ai/latest.md";
      const tagToolbarEl = document.getElementById("tag-toolbar");
      const tagMetaEl = document.getElementById("tag-meta");
      const activeTags = new Set();

      const companies = [
        { key: "openai", name: "OpenAI", rx: [/\bopenai\b/i] },
        { key: "anthropic", name: "Anthropic", rx: [/\banthropic\b/i] },
        { key: "google", name: "Google", rx: [/\bgoogle\b/i, /\balphabet\b/i, /\bgemini\b/i] },
        { key: "microsoft", name: "Microsoft", rx: [/\bmicrosoft\b/i, /\bazure\b/i] },
        { key: "meta", name: "Meta", rx: [/\bmeta\b/i, /\bfacebook\b/i] },
        { key: "nvidia", name: "NVIDIA", rx: [/\bnvidia\b/i] },
        { key: "xai", name: "xAI", rx: [/\bxai\b/i, /\bx\.ai\b/i, /\bgrok\b/i] }
      ];

      const tagDefs = [
        { key: "all", label: "All" },
        { key: "company-openai", label: "OpenAI" },
        { key: "company-anthropic", label: "Anthropic" },
        { key: "company-google", label: "Google" },
        { key: "company-microsoft", label: "Microsoft" },
        { key: "company-meta", label: "Meta" },
        { key: "company-nvidia", label: "NVIDIA" },
        { key: "company-xai", label: "xAI" },
        { key: "company-other", label: "Other" },
        { key: "topic-model-releases", label: "Model Releases" },
        { key: "topic-revenue-fiscal", label: "Revenue/Fiscal" },
        { key: "topic-infrastructure-data-centers", label: "Infrastructure" },
        { key: "topic-ecosystem-policy", label: "Ecosystem/Policy" },
        { key: "topic-xai-grok-watch", label: "xAI/Grok Watch" },
        { key: "topic-general", label: "General" },
        { key: "meta-unverified", label: "UNVERIFIED" },
        { key: "meta-with-url", label: "Has URL" }
      ];

      const topicMap = {
        "model releases": "model-releases",
        "revenue and fiscal": "revenue-fiscal",
        "infrastructure and data centers": "infrastructure-data-centers",
        "ecosystem and policy": "ecosystem-policy",
        "xai / grok watch": "xai-grok-watch"
      };

      const detectCompany = (text) => {
        for (const c of companies) {
          if (c.rx.some((r) => r.test(text))) return c;
        }
        return { key: "other", name: "Other" };
      };

      const detectTopicKey = (sectionText) => {
        if (!sectionText) return "general";
        const k = sectionText.trim().toLowerCase();
        return topicMap[k] || "general";
      };

      const nearestSectionText = (li) => {
        let node = li.previousElementSibling;
        while (node) {
          if (node.tagName === "H2") return node.textContent || "";
          node = node.previousElementSibling;
        }
        return "";
      };

      const retargetExternalLinks = (root) => {
        if (!root) return;
        root.querySelectorAll("a[href]").forEach((a) => {
          const href = a.getAttribute("href") || "";
          if (!href || href.startsWith("#") || href.startsWith("/") || href.startsWith("./") || href.startsWith("../")) {
            return;
          }
          if (/^https?:\/\//i.test(href)) {
            a.setAttribute("target", "_blank");
            a.setAttribute("rel", "noopener noreferrer");
          }
        });
      };

      const syncToolbarState = () => {
        tagToolbarEl.querySelectorAll("button[data-tag]").forEach((btn) => {
          const key = btn.dataset.tag;
          const pressed = key === "all" ? activeTags.size === 0 : activeTags.has(key);
          btn.setAttribute("aria-pressed", pressed ? "true" : "false");
          btn.classList.toggle("active", pressed);
        });
      };

      const applyFilter = () => {
        const items = fallbackEl.querySelectorAll("li[data-tags]");

        items.forEach((li) => {
          const tags = (li.dataset.tags || "").split(" ").filter(Boolean);
          const matches = activeTags.size === 0 || Array.from(activeTags).some((t) => tags.includes(t));
          li.hidden = !matches;
        });

        // Hide empty lists and section headers when no filtered items remain.
        const blocks = fallbackEl.querySelectorAll("h2, ul, ol");
        blocks.forEach((node) => {
          if (node.tagName === "UL" || node.tagName === "OL") {
            const visible = node.querySelector("li[data-tags]:not([hidden])");
            node.hidden = !visible;
          }
        });

        const headings = fallbackEl.querySelectorAll("h2");
        headings.forEach((h2) => {
          let cursor = h2.nextElementSibling;
          let hasVisible = false;
          while (cursor && cursor.tagName !== "H2") {
            if ((cursor.tagName === "UL" || cursor.tagName === "OL") && !cursor.hidden) {
              hasVisible = true;
              break;
            }
            cursor = cursor.nextElementSibling;
          }
          h2.hidden = !hasVisible;
        });

        const visibleCount = fallbackEl.querySelectorAll("li[data-tags]:not([hidden])").length;
        const labels = tagDefs.filter((d) => activeTags.has(d.key)).map((d) => d.label);

        statusEl.textContent = labels.length
          ? "Showing " + visibleCount + " entries for: " + labels.join(", ")
          : "Showing latest report (all tags).";

        tagMetaEl.textContent = labels.length
          ? "Active tags (match any): " + labels.join(" · ")
          : "No tags selected. Showing all entries.";

        syncToolbarState();
      };

      const renderTagToolbar = () => {
        tagToolbarEl.innerHTML = "";
        tagDefs.forEach((def) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "tag-btn";
          btn.dataset.tag = def.key;
          btn.textContent = def.label;
          btn.setAttribute("aria-pressed", def.key === "all" ? "true" : "false");
          btn.addEventListener("click", () => {
            if (def.key === "all") {
              activeTags.clear();
              applyFilter();
              return;
            }
            if (activeTags.has(def.key)) activeTags.delete(def.key);
            else activeTags.add(def.key);
            applyFilter();
          });
          tagToolbarEl.appendChild(btn);
        });
      };

      try {
        const mdResp = await fetch(latestMdPath, { cache: "no-cache" });
        if (!mdResp.ok) {
          throw new Error("HTTP " + mdResp.status + " while loading latest.md");
        }
        const markdown = await mdResp.text();

        if (window.marked && typeof window.marked.parse === "function") {
          window.marked.setOptions({ gfm: true, breaks: true, headerIds: true, mangle: false });
          const rawHtml = window.marked.parse(markdown);
          const safeHtml = (window.DOMPurify && typeof window.DOMPurify.sanitize === "function")
            ? window.DOMPurify.sanitize(rawHtml)
            : rawHtml;
          fallbackEl.innerHTML = safeHtml;
          fallbackEl.style.display = "block";

          // Classify list items and annotate with company badges.
          fallbackEl.querySelectorAll("li").forEach((li) => {
            const text = li.textContent || "";
            const company = detectCompany(text);
            const topic = detectTopicKey(nearestSectionText(li));
            const tags = ["company-" + company.key, "topic-" + topic];
            if (/\[UNVERIFIED\]/i.test(text)) tags.push("meta-unverified");
            if (li.querySelector('a[href]')) tags.push("meta-with-url");
            li.dataset.tags = tags.join(" ");

            const badge = document.createElement("span");
            badge.className = "badge";
            badge.textContent = company.name;
            li.appendChild(badge);
          });

          retargetExternalLinks(fallbackEl);

          renderTagToolbar();
          applyFilter();
          return;
        }

        fallbackEl.textContent = markdown;
        fallbackEl.style.display = "block";
        statusEl.textContent = "Renderer unavailable; showing raw markdown fallback.";
        tagToolbarEl.innerHTML = "";
        tagMetaEl.textContent = "Tag filtering disabled in raw markdown fallback mode.";
      } catch (err) {
        statusEl.textContent = "Could not load latest report HTML or Markdown.";
        statusEl.classList.add("error");
        fallbackEl.innerHTML = "<p>No report is available yet. Please check back after the next publish cycle.</p>";
        fallbackEl.style.display = "block";
        tagToolbarEl.innerHTML = "";
        tagMetaEl.textContent = "Tag filtering unavailable.";
        console.error(err);
      }
    })();
  </script>
</body>
</html>
