<!DOCTYPE html>
<html>
<head>
  <title>README</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 40px 20px;
      line-height: 1.6;
    }
    pre { 
      background: #f6f8fa; 
      padding: 20px; 
      border-radius: 8px; 
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .loading { color: #666; font-style: italic; }
    .error { color: #d73a49; }
  </style>
</head>
<body>
  <h1>README.md</h1>
  <div id="readme-content"></div>
  <script>
    fetch('https://raw.githubusercontent.com/yodabjones/yodabbot/main/README.md')
      .then(response => {
        if (!response.ok) throw new Error('README not found');
        return response.text();
      })
      .then(text => {
        document.getElementById('readme-content').innerHTML = 
          `<pre>${escapeHtml(text)}</pre>`;
      })
      .catch(error => {
        document.getElementById('readme-content').innerHTML = 
          `<p class="error">README.md not found in repository.<br>Please create a README.md file first.</p>`;
      });
  </script>
  <script>
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
