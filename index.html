<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>blearling.com - Latest AI Research Report</title>
  <meta name="description" content="Latest AI research report from yodabot" />
  <style>
    :root {
      --bg: #f2f7fb;
      --panel: #ffffff;
      --ink: #1c2733;
      --muted: #5d6b79;
      --line: #d8e0e8;
      --accent: #0a5f7e;
      --accent-soft: #e7f6fb;
      --code-bg: #f5f8fb;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 14% 0%, #dff5ff 0, rgba(223,245,255,0) 45%),
        radial-gradient(circle at 86% 0%, #ecffe6 0, rgba(236,255,230,0) 48%),
        var(--bg);
      color: var(--ink);
      font: 16px/1.6 "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .shell {
      width: min(1080px, 100% - 2rem);
      margin: 1rem auto 1.5rem;
    }

    .hero {
      padding: 1rem 1.2rem;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fdff 100%);
      box-shadow: 0 10px 24px rgba(14, 30, 37, 0.07);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3.8vw, 2rem);
      line-height: 1.2;
    }

    .hero p {
      margin: 0.35rem 0 0;
      color: var(--muted);
    }

    .links {
      margin-top: 0.7rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .links a {
      text-decoration: none;
      color: var(--accent);
      font-weight: 700;
      background: var(--accent-soft);
      border: 1px solid #c7e9f5;
      border-radius: 999px;
      padding: 0.35rem 0.72rem;
      font-size: 0.92rem;
    }

    .board {
      margin-top: 0.9rem;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 10px 28px rgba(8, 19, 32, 0.06);
      overflow: hidden;
    }

    .status {
      margin: 0;
      padding: 0.8rem 1rem;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: #f8fbfd;
      font-size: 0.94rem;
    }

    .status.error {
      color: #b42318;
      font-weight: 700;
    }

    #report-frame {
      width: 100%;
      min-height: 74vh;
      border: 0;
      display: none;
      background: #fff;
    }

    #fallback {
      display: none;
      padding: 1rem;
      max-width: 84ch;
      margin: 0 auto;
    }

    #fallback h1,
    #fallback h2,
    #fallback h3,
    #fallback h4 {
      line-height: 1.25;
      margin: 1.1em 0 0.45em;
    }

    #fallback h2 {
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.2em;
    }

    #fallback p,
    #fallback ul,
    #fallback ol,
    #fallback pre,
    #fallback blockquote,
    #fallback table {
      margin: 0.65em 0;
    }

    #fallback a {
      color: var(--accent);
      text-underline-offset: 0.12em;
    }

    #fallback code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 0.35em;
      padding: 0.12em 0.35em;
    }

    #fallback pre {
      overflow: auto;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 0.65rem;
      padding: 0.8rem;
    }

    #fallback pre code {
      border: 0;
      background: transparent;
      padding: 0;
    }

    #fallback table {
      border-collapse: collapse;
      width: 100%;
    }

    #fallback th,
    #fallback td {
      border: 1px solid var(--line);
      padding: 0.45rem 0.6rem;
      text-align: left;
    }

    #fallback th {
      background: #ebf6fb;
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Latest AI Research Report</h1>
      <p>Writer-rendered report output from researcher findings.</p>
      <nav class="links" aria-label="report links">
        <a href="/reports/ai/latest.html">Open latest report HTML</a>
        <a href="/reports/ai/by-company.html">View latest by company</a>
        <a href="/reports/ai/latest.md">Open latest report Markdown</a>
        <a href="/reports/ai/">Open report archive</a>
      </nav>
    </section>

    <section class="board" aria-live="polite">
      <p id="status" class="status">Loading latest report HTML...</p>
      <iframe id="report-frame" title="Latest AI report" loading="eager"></iframe>
      <article id="fallback"></article>
    </section>
  </main>

  <script>
    (async () => {
      const statusEl = document.getElementById("status");
      const frameEl = document.getElementById("report-frame");
      const fallbackEl = document.getElementById("fallback");
      const latestHtmlPath = "/reports/ai/latest.html";
      const latestMdPath = "/reports/ai/latest.md";

      // Primary path: render prebuilt HTML report.
      try {
        const htmlResp = await fetch(latestHtmlPath, { method: "HEAD", cache: "no-cache" });
        if (htmlResp.ok) {
          frameEl.src = latestHtmlPath;
          frameEl.style.display = "block";
          statusEl.textContent = "Showing latest report HTML.";
          return;
        }
      } catch (_err) {
        // Continue to markdown fallback path.
      }

      // Fallback path: render markdown file as HTML in this page.
      try {
        statusEl.textContent = "HTML report missing; rendering Markdown fallback...";
        const mdResp = await fetch(latestMdPath, { cache: "no-cache" });
        if (!mdResp.ok) {
          throw new Error("HTTP " + mdResp.status + " while loading latest.md");
        }
        const markdown = await mdResp.text();

        if (window.marked && typeof window.marked.parse === "function") {
          window.marked.setOptions({ gfm: true, breaks: true, headerIds: true, mangle: false });
          const rawHtml = window.marked.parse(markdown);
          const safeHtml = (window.DOMPurify && typeof window.DOMPurify.sanitize === "function")
            ? window.DOMPurify.sanitize(rawHtml)
            : rawHtml;
          fallbackEl.innerHTML = safeHtml;
          fallbackEl.style.display = "block";
          statusEl.textContent = "Showing Markdown-rendered fallback.";
          return;
        }

        fallbackEl.textContent = markdown;
        fallbackEl.style.display = "block";
        statusEl.textContent = "Renderer unavailable; showing raw markdown fallback.";
      } catch (err) {
        statusEl.textContent = "Could not load latest report HTML or Markdown.";
        statusEl.classList.add("error");
        fallbackEl.innerHTML = "<p>No report is available yet. Please check back after the next publish cycle.</p>";
        fallbackEl.style.display = "block";
        console.error(err);
      }
    })();
  </script>
</body>
</html>
