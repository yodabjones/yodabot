<div class="shell">
  <header>
    <h1>AI Article Archive</h1>
    <p class="sub">All previously reported articles, searchable and paginated.</p>
  </header>
  <div class="controls">
    <input type="text" id="query" placeholder="Filter by tag, keyword, or domain…" autocomplete="off" />
    <span id="hint" class="hint"></span>
  </div>
  <p id="meta" class="meta"></p>
  <table id="table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Summary</th>
        <th>Source</th>
        <th>Tags</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="pager" class="pager hidden">
    <button id="prev">← Prev</button>
    <span id="page-info"></span>
    <button id="next">Next →</button>
  </div>
</div>
<script>
  (function() {
    const data = window.__ARCHIVE__ || [];
    const tbody = document.getElementById('tbody');
    const queryInput = document.getElementById('query');
    const hint = document.getElementById('hint');
    const meta = document.getElementById('meta');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const pager = document.getElementById('pager');
    const pageSize = 50;
    let page = 0;
    let filtered = data;

    const rows = data.map((item) => {
      const tr = document.createElement('tr');
      tr.setAttribute('data-tags', item.tags.join('|').toLowerCase());
      tr.setAttribute('data-article-id', item.url);
      const safeSummary = item.summary.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const safeUrl = item.url.replace(/"/g,'&quot;');
      const host = (() => { try { return new URL(item.url).hostname.replace(/^www\./, ''); } catch { return item.url; } })();
      tr.innerHTML = `<td class="date">${item.stamp}</td><td class="summary">${safeSummary}</td><td class="src"><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${host}</a></td><td class="tags">${item.tags.slice(0,6).join(', ')}</td>`;
      return tr;
    });

    rows.forEach((r) => tbody.appendChild(r));

    const applyFilter = () => {
      const q = queryInput.value.trim().toLowerCase();
      const active = q ? q.split(/\s+/).filter(Boolean) : [];
      hint.textContent = '';
      if (!active.length) { filtered = rows; return; }
      filtered = rows.filter((row) => {
        const rowTags = (row.getAttribute('data-tags') || '').split('|');
        return active.every((term) => rowTags.some((tag) => tag.includes(term)));
      });
      hint.textContent = `Filter: ${active.join(', ')} • ${filtered.length} matches`;
    };

    const render = () => {
      applyFilter();
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      if (page >= totalPages) page = totalPages - 1;
      rows.forEach((r) => r.style.display = 'none');
      const start = page * pageSize;
      filtered.slice(start, start + pageSize).forEach((r) => r.style.display = '');
      meta.textContent = `Page ${page + 1} of ${totalPages} • ${filtered.length} articles`;
      prev.disabled = page === 0;
      next.disabled = page >= totalPages - 1;
      pager.classList.toggle('hidden', filtered.length <= pageSize);
    };

    prev.addEventListener('click', () => { if (page > 0) { page--; render(); window.scrollTo({top:0}); } });
    next.addEventListener('click', () => { const t = Math.max(1, Math.ceil(filtered.length / pageSize)); if (page < t - 1) { page++; render(); window.scrollTo({top:0}); } });
    queryInput.addEventListener('input', () => { page = 0; render(); });
    render();
  })();
</script>
</body>
</html>
