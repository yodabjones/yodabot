<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Report - 2026-03-17T00-37-02Z</title>
  <meta name="description" content="yodabot AI report" />
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #5f6c7b;
      --line: #d9e2ec;
      --accent: #0b6e4f;
      --accent-soft: #e5f6f1;
      --code-bg: #f7fafc;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 45%);
      color: var(--ink);
      font: 16px/1.6 "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .shell {
      width: min(980px, 100% - 2rem);
      margin: 1.2rem auto 2rem;
    }
    .card {
      padding: 1rem 1.2rem;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }
    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    h1 {
      margin: 0.15rem 0 0.25rem;
      font-size: clamp(1.5rem, 3.8vw, 2.1rem);
      line-height: 1.2;
    }
    .status { margin: 0 0 0.8rem; color: var(--muted); }
    .status.error { color: #b42318; font-weight: 700; }
    #content { max-width: 78ch; }
    #content h1, #content h2, #content h3, #content h4 { line-height: 1.25; margin: 1.1em 0 0.45em; }
    #content h2 { border-bottom: 1px solid var(--line); padding-bottom: 0.2em; }
    #content p, #content ul, #content ol, #content pre, #content blockquote, #content table { margin: 0.65em 0; }
    #content a { color: var(--accent); text-underline-offset: 0.12em; }
    #content a:hover { background: var(--accent-soft); }
    #content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 0.35em;
      padding: 0.12em 0.35em;
    }
    #content pre {
      overflow: auto;
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 0.65rem;
      padding: 0.8rem;
    }
    #content pre code { border: 0; background: transparent; padding: 0; }
    #content blockquote {
      border-left: 4px solid #7ec9b0;
      background: #f0faf7;
      border-radius: 0 10px 10px 0;
      padding: 0.3rem 0.9rem;
    }
    #content table { border-collapse: collapse; width: 100%; }
    #content th, #content td { border: 1px solid var(--line); padding: 0.45rem 0.6rem; text-align: left; }
    #content th { background: #edf7f3; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
</head>
<body>
  <main class="shell">
    <section class="card" aria-live="polite">
      <p class="meta">yodabot AI report</p>
      <h1>AI Report - 2026-03-17T00-37-02Z</h1>
      <p id="status" class="status">Loading report markdown...</p>
      <article id="content"></article>
    </section>
  </main>

  <script>
    (async () => {
      const status = document.getElementById("status");
      const content = document.getElementById("content");

      const retargetExternalLinks = (root) => {
        if (!root) return;
        root.querySelectorAll("a[href]").forEach((a) => {
          const href = a.getAttribute("href") || "";
          if (!href || href.startsWith("#") || href.startsWith("/") || href.startsWith("./") || href.startsWith("../")) {
            return;
          }
          if (/^https?:\/\//i.test(href)) {
            a.setAttribute("target", "_blank");
            a.setAttribute("rel", "noopener noreferrer");
          }
        });
      };

      try {
        const resp = await fetch("./2026-03-17T00-37-02Z.md", { cache: "no-cache" });
        if (!resp.ok) {
          throw new Error("HTTP " + resp.status + " while loading ./2026-03-17T00-37-02Z.md");
        }
        const markdown = await resp.text();

        if (window.marked && typeof window.marked.parse === "function") {
          window.marked.setOptions({ gfm: true, breaks: true, headerIds: true, mangle: false });
          const rawHtml = window.marked.parse(markdown);
          const safeHtml = (window.DOMPurify && typeof window.DOMPurify.sanitize === "function")
            ? window.DOMPurify.sanitize(rawHtml)
            : rawHtml;
          content.innerHTML = safeHtml;
          retargetExternalLinks(content);
          status.textContent = "Report loaded.";
          return;
        }

        content.textContent = markdown;
        status.textContent = "Renderer unavailable, showing markdown text fallback.";
      } catch (err) {
        status.textContent = "Failed to load report markdown.";
        status.classList.add("error");
        content.innerHTML = "<p>Could not render report content. Confirm the markdown file exists.</p>";
        console.error(err);
      }
    })();
  </script>
</body>
</html>
